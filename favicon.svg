<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="DeadHangs favicon">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0f172a"/>

  <!-- Pull-up bar -->
  <rect x="5" y="8" width="22" height="3" rx="1.5" fill="#ea580c"/>

  <!-- Left hand -->
  <rect x="9" y="11" width="4" height="3" rx="1.5" fill="#ffffff"/>
  <!-- Right hand -->
  <rect x="19" y="11" width="4" height="3" rx="1.5" fill="#ffffff"/>

  <!-- Left arm -->
  <line x1="11" y1="14" x2="13" y2="19" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Right arm -->
  <line x1="21" y1="14" x2="19" y2="19" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="16" cy="17" r="3" fill="#ffffff"/>

  <!-- Body -->
  <line x1="16" y1="20" x2="16" y2="26" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="16" y1="26" x2="13" y2="30" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="19" y2="30" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
